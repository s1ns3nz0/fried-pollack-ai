name: redteam-ci

# 테스트 + 공격 평가 회귀 게이트를 모든 PR/푸시에서 강제(§2.9 머지 게이트).
on:
  push:
    branches: [main, master, develop]
  pull_request:

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install (문서화된 설치 = requirements.txt 전체, LangGraph 기본 러너 포함)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Unit tests (LangGraph 러너 — 문서 설치와 동일 경로)
        run: python -m pytest tests/ -q

      - name: Unit tests (stdlib 폴백 러너 — LangGraph 미설치 경로도 회귀 방지)
        run: |
          pip uninstall -y langgraph
          python -m pytest tests/ -q

      - name: Attack eval + regression gate (결정론·오프라인)
        run: python -m benchmarks.check_gates --run

      - name: Verify claims (문서 수치 재파생 + anti-fitting 정직성 가드)
        run: python -m benchmarks.verify_claims

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: gitleaks (페이로드·토큰 유출 차단)
        uses: gitleaks/gitleaks-action@v2

  build-push-and-bump:
    runs-on: ubuntu-latest
    needs: [test-and-gate, secret-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          az acr login --name "$ACR_NAME"
          IMAGE="$ACR_NAME.azurecr.io/fried-pollack-ai:$IMAGE_TAG"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Bump AKS overlay image tag
        env:
          ACR_NAME: ${{ vars.ACR_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd deploy/overlays/aks
          kustomize edit set image "fried-pollack-ai=$ACR_NAME.azurecr.io/fried-pollack-ai:$IMAGE_TAG"

      - name: Commit GitOps image bump
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/overlays/aks/kustomization.yaml
          git commit -m "chore(gitops): promote fried-pollack-ai ${IMAGE_TAG} [skip ci]"
          git push
