apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: fried-pollack-azure-openai
  namespace: fried-pollack
spec:
  provider: AzureOpenAI
  model: gpt-4o-mini
  apiKeySecret: kagent-azure-openai
  apiKeySecretKey: AZUREOPENAI_API_KEY
  azureOpenAI:
    # Placeholder — real account not committed; bootstrap-red-agent.sh injects
    # $AZURE_OPENAI_ACCOUNT_NAME for `dah-aoai-REDACTED` when applying the overlay.
    azureEndpoint: https://dah-aoai-REDACTED.openai.azure.com/
    azureDeployment: gpt-4o-soc
    apiVersion: "2024-10-21"
