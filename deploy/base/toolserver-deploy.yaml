apiVersion: apps/v1
kind: Deployment
metadata:
  name: fried-pollack-toolserver
  labels:
    app.kubernetes.io/name: fried-pollack-ai
    app.kubernetes.io/component: mcp-toolserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: fried-pollack-ai
      app.kubernetes.io/component: mcp-toolserver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fried-pollack-ai
        app.kubernetes.io/component: mcp-toolserver
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: fried-pollack-toolserver
      nodeSelector:
        workload: red-agent
      tolerations:
        - key: workload
          operator: Equal
          value: red-agent
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: toolserver
          image: fried-pollack-ai:9db7585
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8080"
            - name: MCP_TRANSPORT
              value: "sse"
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: fried-pollack-toolserver
  labels:
    app.kubernetes.io/name: fried-pollack-ai
    app.kubernetes.io/component: mcp-toolserver
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fried-pollack-ai
    app.kubernetes.io/component: mcp-toolserver
  ports:
    - name: http
      port: 8080
      targetPort: http
